name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Finotion \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.2' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee build.log | grep -E '^(Build|Test|error:|warning:|✓|✗|FAILED|PASSED)' || true
          grep -q 'TEST SUCCEEDED' build.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Check coverage
        run: |
          xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          targets = data.get('targets', [])
          target = next((t for t in targets if t['name'] == 'Finotion.app'), None)
          if target:
              cov = target['lineCoverage'] * 100
              print(f'Coverage: {cov:.1f}%')
              sys.exit(0 if cov >= 80 else 1)
          else:
              print('Coverage target not found — skipping gate')
          "
