name: Finotion
options:
  bundleIdPrefix: com.finotion
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Finotion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Finotion
        excludes:
          - "**/.gitkeep"
    info:
      path: Finotion/Info.plist
    entitlements:
      path: Finotion/Finotion.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finotion.app
        CODE_SIGN_ENTITLEMENTS: Finotion/Finotion.entitlements
        INFOPLIST_FILE: Finotion/Info.plist
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi

  FinotionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinotionTests
    dependencies:
      - target: Finotion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finotion.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Finotion.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Finotion
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  Finotion:
    build:
      targets:
        Finotion: all
        FinotionTests: [testing]
    test:
      targets:
        - name: FinotionTests
          parallelizable: false
      gatherCoverageData: true
      coverageTargets:
        - Finotion
